# Тесты зависят от Windows (pywin32, winsound в main.py) — runner windows-latest.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Tests (Windows, uv)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync dependencies (locked)
        run: uv sync --frozen

      - name: Run pytest
        run: uv run pytest tests/ -v --tb=short
